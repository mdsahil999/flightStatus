<div class="search-card">
  <div class="search-header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0b57d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <h2>Search Flight</h2>
  </div>
  
  <form [formGroup]="searchForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="flightNumber">Flight Number</label>
      <div class="input-container">
        <input id="flightNumber" type="text" formControlName="flightNumber" placeholder="e.g. AA2405">
        <span class="hash-icon">#</span>
      </div>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <div class="input-container">
        <input id="date" type="date" formControlName="date">
      </div>
    </div>

    <button type="submit" [disabled]="!searchForm.valid" class="btn-primary">Search Flight</button>
  </form>
</div>
